<svg width="900" height="720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- orient="auto" rotates the right-pointing triangle to match the line direction -->
    <marker id="arr-red"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f38ba8"/></marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a6e3a1"/></marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#1e1e2e" rx="12"/>

  <!-- ─────────────────────────────────────────────────────────
       TITLE
  ───────────────────────────────────────────────────────────── -->
  <text x="450" y="28" text-anchor="middle" fill="#cdd6f4" font-size="16" font-weight="bold" font-family="monospace">Executor JVM Memory Map</text>
  <text x="450" y="45" text-anchor="middle" fill="#585b70" font-size="10" font-family="monospace">spark.executor.memory = 1g  ·  memory.fraction = 0.6  ·  storageFraction = 0.5  ·  sizes approximate</text>

  <!-- ─────────────────────────────────────────────────────────
       CONTAINER  (dashed — total process memory)
  ───────────────────────────────────────────────────────────── -->
  <rect x="16" y="54" width="868" height="566" rx="8" fill="none" stroke="#313244" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="450" y="71" text-anchor="middle" fill="#45475a" font-size="10" font-family="monospace">Total container  ≈  1g (JVM heap) + 384m (overhead)  ≈  1.4 GB</text>

  <!-- ─────────────────────────────────────────────────────────
       JVM HEAP  (blue border)
  ───────────────────────────────────────────────────────────── -->
  <rect x="26" y="78" width="848" height="438" rx="6" fill="#13132a" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="50" y="97" fill="#89b4fa" font-size="12" font-weight="bold" font-family="monospace">JVM Heap  (spark.executor.memory = 1 GB = 1024 MB)</text>

  <!-- ─────────────────────────────────────────────────────────
       SPARK MANAGED POOL  (purple border)
  ───────────────────────────────────────────────────────────── -->
  <rect x="34" y="105" width="832" height="258" rx="5" fill="#1a1828" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="50" y="123" fill="#cba6f7" font-size="11" font-weight="bold" font-family="monospace">Spark Managed Pool  ·  ~434 MB  ·  60% of usable heap</text>
  <text x="50" y="140" fill="#585b70" font-size="10" font-family="monospace">spark.memory.fraction = 0.6  ×  (1024 − 300) MB usable  =  ~434 MB</text>

  <!-- ── Storage Pool  (green border) ── -->
  <rect x="42" y="148" width="816" height="106" rx="4" fill="#0d1f15" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="58" y="167" fill="#a6e3a1" font-size="11" font-weight="bold" font-family="monospace">Storage Pool  ·  ~217 MB  (initial floor)</text>
  <text x="58" y="183" fill="#585b70" font-size="10" font-family="monospace">spark.memory.storageFraction = 0.5  ×  ~434 MB  =  ~217 MB  minimum guarantee</text>
  <text x="58" y="200" fill="#cdd6f4" font-size="10" font-family="monospace">●  Cached RDDs / DataFrames  —  InMemoryTableScan appears in explain()</text>
  <text x="58" y="217" fill="#cdd6f4" font-size="10" font-family="monospace">●  Broadcast variables  (build-side copy per executor for BroadcastHashJoin)</text>
  <text x="58" y="234" fill="#585b70" font-size="9.5" font-family="monospace">Blocks above storageFraction floor are evictable by execution under memory pressure</text>
  <!-- Storage Pool: y=148, h=106, bottom=254 -->

  <!-- ── Unified memory model soft boundary ── -->
  <!-- Dashed separator at centre of the 20 px gap (y=254 to y=274) -->
  <line x1="50" y1="264" x2="846" y2="264" stroke="#cba6f7" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- Up arrow  (from gap into storage zone — execution can evict storage) -->
  <line x1="62" y1="271" x2="62" y2="257" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <!-- Down arrow (from gap into execution zone — storage uses idle execution) -->
  <line x1="78" y1="257" x2="78" y2="271" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="92" y="261" fill="#cba6f7" font-size="10" font-family="monospace">unified memory model  ·  soft boundary  ·  execution evicts storage; storage uses idle execution space</text>

  <!-- ── Execution Pool  (red border) ── -->
  <!-- Execution Pool: y=274, h=86, bottom=360 -->
  <rect x="42" y="274" width="816" height="86" rx="4" fill="#200d0d" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="58" y="292" fill="#f38ba8" font-size="11" font-weight="bold" font-family="monospace">Execution Pool  ·  ~217 MB  (initial)  ·  grows to ~434 MB when cache is empty</text>
  <text x="58" y="309" fill="#cdd6f4" font-size="10" font-family="monospace">●  HashAggregate (partial/final)  ●  Sort  ●  SortMergeJoin  ●  Shuffle write buffers</text>
  <text x="58" y="326" fill="#fab387" font-size="10" font-family="monospace">Pool exhausted  →  SPILL TO DISK  →  Shuffle Spill (Disk) &gt; 0  in Task Metrics</text>
  <text x="58" y="343" fill="#585b70" font-size="9.5" font-family="monospace">First evicts cache above floor, then spills to local disk, then OOM if disk is also exhausted</text>
  <!-- Spark Managed Pool: y=105, h=258, bottom=363  (3 px below execution box) ✓ -->

  <!-- ─────────────────────────────────────────────────────────
       USER MEMORY  (blue border, dimmer)
  ───────────────────────────────────────────────────────────── -->
  <!-- Gap: 363 → 371  (8 px) -->
  <rect x="34" y="371" width="832" height="85" rx="4" fill="#0d1020" stroke="#89b4fa" stroke-width="1"/>
  <text x="50" y="390" fill="#89b4fa" font-size="11" font-weight="bold" font-family="monospace">User Memory  ·  ~290 MB  (40% of usable heap)</text>
  <text x="50" y="407" fill="#585b70" font-size="10" font-family="monospace">(1 − spark.memory.fraction) × usable  =  0.4  ×  724 MB  =  ~290 MB</text>
  <text x="50" y="424" fill="#cdd6f4" font-size="10" font-family="monospace">Python UDFs  ·  Internal data structures  ·  Spark RPC state  ·  User-defined objects</text>
  <text x="50" y="441" fill="#585b70" font-size="9.5" font-family="monospace">High GC Time in Task Metrics = short-lived objects accumulating here (UDF row churn)</text>
  <!-- User Memory: y=371, h=85, bottom=456 -->

  <!-- ─────────────────────────────────────────────────────────
       RESERVED  (gray border)
  ───────────────────────────────────────────────────────────── -->
  <!-- Gap: 456 → 462  (6 px) -->
  <rect x="34" y="462" width="832" height="42" rx="3" fill="#181825" stroke="#585b70" stroke-width="1"/>
  <text x="450" y="488" text-anchor="middle" fill="#585b70" font-size="10" font-family="monospace">Reserved  ·  300 MB  ·  hardcoded in Spark source  ·  not configurable</text>
  <!-- Reserved: y=462, h=42, bottom=504  ·  JVM Heap bottom=516  (12 px padding) ✓ -->

  <!-- ─────────────────────────────────────────────────────────
       OFF-HEAP  (orange border)
  ───────────────────────────────────────────────────────────── -->
  <!-- Gap below JVM Heap: 516 → 528  (12 px) -->
  <rect x="26" y="528" width="848" height="82" rx="5" fill="#1f1510" stroke="#fab387" stroke-width="1.5"/>
  <text x="50" y="547" fill="#fab387" font-size="11" font-weight="bold" font-family="monospace">Off-heap  (spark.executor.memoryOverhead)</text>
  <text x="50" y="563" fill="#585b70" font-size="10" font-family="monospace">= max(spark.executor.memory × 0.1,  384 MB)  =  max(102 MB, 384 MB)  =  384 MB  (default)</text>
  <text x="50" y="580" fill="#cdd6f4" font-size="10" font-family="monospace">Python worker processes (PySpark UDFs)  ·  Netty shuffle buffers  ·  JVM thread stacks &amp; JIT code</text>
  <text x="50" y="597" fill="#585b70" font-size="9.5" font-family="monospace">OOM here = container killed by YARN / K8s  (no java.lang.OutOfMemoryError in logs)</text>
  <!-- Off-heap: y=528, h=82, bottom=610  ·  Container bottom=620  (10 px padding) ✓ -->

  <!-- ─────────────────────────────────────────────────────────
       FORMULA STRIP
  ───────────────────────────────────────────────────────────── -->
  <rect x="16" y="628" width="868" height="76" rx="5" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="28" y="645" fill="#585b70" font-size="10" font-family="monospace">CALCULATION  (spark.executor.memory = 1g, default fractions)</text>
  <text x="28" y="661" fill="#74c7ec" font-size="10" font-family="monospace">usable = 1024 − 300 = 724 MB   ·   Spark pool = 724 × 0.6 = ~434 MB   ·   each sub-pool starts at ~217 MB</text>
  <text x="28" y="677" fill="#74c7ec" font-size="10" font-family="monospace">user memory = 724 × 0.4 = ~290 MB   ·   overhead = 384 MB   ·   total container ≈ 1024 + 384 = 1408 MB</text>
  <text x="28" y="693" fill="#45475a" font-size="9.5" font-family="monospace">execution grows to ~434 MB when cache is empty  ·  cache eviction is silent  ·  spill = pool exhausted after eviction</text>

</svg>
