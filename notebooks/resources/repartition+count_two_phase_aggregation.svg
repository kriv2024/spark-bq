<svg width="900" height="820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f38ba8"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a6e3a1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="820" fill="#1e1e2e" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#cdd6f4" font-size="18" font-weight="bold" font-family="monospace">df.count() on repartitioned DataFrame — Full Physical Plan</text>

  <!-- ══ STAGE 0 ══ -->
  <rect x="20" y="48" width="860" height="122" rx="8" fill="#181825" stroke="#313244" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="35" y="66" fill="#585b70" font-size="12" font-family="monospace">STAGE 0  —  scan</text>

  <!-- LocalTableScan -->
  <rect x="295" y="78" width="310" height="62" rx="6" fill="#272740" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="450" y="103" text-anchor="middle" fill="#89b4fa" font-size="13" font-weight="bold" font-family="monospace">LocalTableScan</text>
  <text x="450" y="124" text-anchor="middle" fill="#a6adc8" font-size="12" font-family="monospace">1,000 rows  (from pandas)</text>

  <!-- Arrow: LocalTableScan → Exchange 1 -->
  <line x1="450" y1="140" x2="450" y2="173" stroke="#888" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- ══ EXCHANGE 1 — repartition(8) — Stage Boundary ══ -->
  <rect x="240" y="176" width="420" height="82" rx="8" fill="#3d1506" stroke="#fab387" stroke-width="2"/>
  <text x="450" y="201" text-anchor="middle" fill="#fab387" font-size="13" font-weight="bold" font-family="monospace">Exchange 1 — repartition(8)</text>
  <text x="450" y="220" text-anchor="middle" fill="#a6adc8" font-size="11" font-family="monospace">RoundRobinPartitioning  ·  shuffle records written: 1,000</text>
  <text x="450" y="241" text-anchor="middle" fill="#f38ba8" font-size="11" font-weight="bold" font-family="monospace">⚡ Stage Boundary — ALL 1,000 rows cross the network</text>

  <!-- Diverging red arrows: Exchange 1 → 8 partitions (3 representative) -->
  <line x1="370" y1="258" x2="175" y2="302" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <line x1="450" y1="258" x2="450" y2="302" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <line x1="530" y1="258" x2="725" y2="302" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>

  <!-- ══ STAGE 1 ══ -->
  <rect x="20" y="272" width="860" height="232" rx="8" fill="#181825" stroke="#313244" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="35" y="290" fill="#585b70" font-size="12" font-family="monospace">STAGE 1  —  read 8 balanced partitions → partial count</text>

  <!-- Partition 0 -->
  <rect x="55" y="302" width="190" height="60" rx="6" fill="#272740" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="150" y="326" text-anchor="middle" fill="#89b4fa" font-size="12" font-weight="bold" font-family="monospace">Partition 0</text>
  <text x="150" y="346" text-anchor="middle" fill="#a6adc8" font-size="12" font-family="monospace">~125 rows</text>

  <!-- Partitions 1–6 (faded — represents 6 others) -->
  <rect x="355" y="302" width="190" height="60" rx="6" fill="#1e1e2e" stroke="#45475a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="324" text-anchor="middle" fill="#585b70" font-size="12" font-family="monospace">Partitions 1–6</text>
  <text x="450" y="344" text-anchor="middle" fill="#585b70" font-size="12" font-family="monospace">~125 rows each</text>

  <!-- Partition 7 -->
  <rect x="655" y="302" width="190" height="60" rx="6" fill="#272740" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="750" y="326" text-anchor="middle" fill="#89b4fa" font-size="12" font-weight="bold" font-family="monospace">Partition 7</text>
  <text x="750" y="346" text-anchor="middle" fill="#a6adc8" font-size="12" font-family="monospace">~125 rows</text>

  <!-- Arrows: partitions → HashAggregate Partial -->
  <line x1="150" y1="362" x2="150" y2="382" stroke="#888" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="450" y1="362" x2="450" y2="382" stroke="#888" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="750" y1="362" x2="750" y2="382" stroke="#888" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- HashAggregate (Partial) 0 -->
  <rect x="55" y="384" width="190" height="88" rx="6" fill="#1c2e48" stroke="#74c7ec" stroke-width="1.5"/>
  <text x="150" y="408" text-anchor="middle" fill="#74c7ec" font-size="12" font-weight="bold" font-family="monospace">HashAggregate</text>
  <text x="150" y="426" text-anchor="middle" fill="#74c7ec" font-size="11" font-family="monospace">(Partial)</text>
  <text x="150" y="448" text-anchor="middle" fill="#585b70" font-size="11" font-family="monospace">counts ~125 rows</text>
  <text x="150" y="465" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="bold" font-family="monospace">→ 125</text>

  <!-- HashAggregate (Partial) 1–6 (faded) -->
  <rect x="355" y="384" width="190" height="88" rx="6" fill="#1a1a2a" stroke="#313244" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="408" text-anchor="middle" fill="#45475a" font-size="12" font-weight="bold" font-family="monospace">HashAggregate</text>
  <text x="450" y="426" text-anchor="middle" fill="#45475a" font-size="11" font-family="monospace">(Partial) × 6</text>
  <text x="450" y="448" text-anchor="middle" fill="#45475a" font-size="11" font-family="monospace">~125 rows each</text>
  <text x="450" y="465" text-anchor="middle" fill="#45475a" font-size="12" font-family="monospace">→ 750 total</text>

  <!-- HashAggregate (Partial) 7 -->
  <rect x="655" y="384" width="190" height="88" rx="6" fill="#1c2e48" stroke="#74c7ec" stroke-width="1.5"/>
  <text x="750" y="408" text-anchor="middle" fill="#74c7ec" font-size="12" font-weight="bold" font-family="monospace">HashAggregate</text>
  <text x="750" y="426" text-anchor="middle" fill="#74c7ec" font-size="11" font-family="monospace">(Partial)</text>
  <text x="750" y="448" text-anchor="middle" fill="#585b70" font-size="11" font-family="monospace">counts ~125 rows</text>
  <text x="750" y="465" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="bold" font-family="monospace">→ 125</text>

  <!-- Converging red arrows: HashAggregate Partial → Exchange 2 -->
  <line x1="150" y1="472" x2="368" y2="520" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <line x1="450" y1="472" x2="450" y2="520" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <line x1="750" y1="472" x2="532" y2="520" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>

  <!-- ══ EXCHANGE 2 — count aggregation — Stage Boundary ══ -->
  <rect x="240" y="522" width="420" height="82" rx="8" fill="#3d1506" stroke="#fab387" stroke-width="2"/>
  <text x="450" y="547" text-anchor="middle" fill="#fab387" font-size="13" font-weight="bold" font-family="monospace">Exchange 2 — count aggregation</text>
  <text x="450" y="566" text-anchor="middle" fill="#a6adc8" font-size="11" font-family="monospace">hashpartitioning(1)  ·  shuffle records written: 8</text>
  <text x="450" y="587" text-anchor="middle" fill="#f38ba8" font-size="11" font-weight="bold" font-family="monospace">⚡ Stage Boundary — only 8 integers cross the network</text>

  <!-- Arrow: Exchange 2 → HashAgg Final -->
  <line x1="450" y1="604" x2="450" y2="643" stroke="#888" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- ══ STAGE 2 ══ -->
  <rect x="20" y="618" width="860" height="128" rx="8" fill="#181825" stroke="#313244" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="35" y="636" fill="#585b70" font-size="12" font-family="monospace">STAGE 2  —  final aggregation</text>

  <!-- HashAggregate Final -->
  <rect x="295" y="645" width="310" height="82" rx="6" fill="#1a3520" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="450" y="670" text-anchor="middle" fill="#a6e3a1" font-size="12" font-weight="bold" font-family="monospace">HashAggregate (Final)</text>
  <text x="450" y="690" text-anchor="middle" fill="#a6adc8" font-size="11" font-family="monospace">sums 8 partial counts</text>
  <text x="450" y="712" text-anchor="middle" fill="#cdd6f4" font-size="14" font-weight="bold" font-family="monospace">= 1,000</text>

  <!-- Arrow: HashAgg Final → Driver -->
  <line x1="450" y1="727" x2="450" y2="755" stroke="#a6e3a1" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Driver -->
  <rect x="355" y="757" width="190" height="52" rx="6" fill="#2d2040" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="450" y="781" text-anchor="middle" fill="#cba6f7" font-size="13" font-weight="bold" font-family="monospace">Driver</text>
  <text x="450" y="800" text-anchor="middle" fill="#cdd6f4" font-size="12" font-family="monospace">returns: 1,000</text>

  <!-- Legend -->
  <line x1="30" y1="764" x2="58" y2="764" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="63" y="768" fill="#585b70" font-size="11" font-family="monospace">network shuffle</text>
  <line x1="195" y1="764" x2="223" y2="764" stroke="#888" stroke-width="1.5"/>
  <text x="228" y="768" fill="#585b70" font-size="11" font-family="monospace">local data flow</text>
</svg>
