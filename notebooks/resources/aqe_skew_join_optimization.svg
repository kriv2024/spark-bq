  <text x="672" y="455" text-anchor="middle" fill="#74c7ec" font-size="10" font-family="monospace">build side (products): 1 row replicated ×4 — one copy per split</text>

  <!-- ══ KEY MECHANICS ══ -->
  <rect x="20" y="465" width="860" height="116" rx="7" fill="#181825" stroke="#313244" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="30" y="482" fill="#585b70" font-size="10" font-family="monospace">KEY MECHANICS</text>

  <text x="40" y="499" fill="#cdd6f4" font-size="10" font-weight="bold" font-family="monospace">① Coalesce floor — advisoryPartitionSizeInBytes alone is not enough:</text>
  <text x="40" y="514" fill="#74c7ec" font-size="10" font-family="monospace">   targetSize = max(advisory,  max(minPartitionSize,  ⌈totalBytes ÷ minPartitionNum⌉))</text>
  <text x="40" y="528" fill="#585b70" font-size="10" font-family="monospace">   minPartitionSize defaults to 1 MB.  Fix: set both minPartitionSize=1b and minPartitionNum=20.</text>

  <text x="40" y="546" fill="#cdd6f4" font-size="10" font-weight="bold" font-family="monospace">② Skew split requires ≥ 2 map tasks writing to the hot-key bucket (split is by mapper index range).</text>
  <text x="40" y="561" fill="#585b70" font-size="10" font-family="monospace">   1 Parquet file → 1 map task → 0 splits.  Fix: repartition(N) inside the query plan before the join.</text>

  <text x="40" y="576" fill="#cdd6f4" font-size="10" font-weight="bold" font-family="monospace">③ Detection threshold: size &gt; max(skewedPartitionFactor × median,  skewedPartitionThresholdInBytes)</text>

  <!-- ══ LEGEND ══ -->
